<!-- For usage example check out: layouts/brukeropplevelse-og-datadeling/team/list.html -->
{{ $id := (now.UnixNano) | printf "%x" | replaceRE "[^a-zA-Z0-9]+" "" }}

<div class="ds-card">
  <details class="ds-details" data-variant="tinted">
    <summary>
      {{ $.title }}
    </summary>
    <div>
      {{ $.content | markdownify | safeHTML }}
    </div>
  </details>
</div>
